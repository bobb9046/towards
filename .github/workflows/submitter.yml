name: submitter
on:
  push:
    branches: [ "main" ]

jobs:
    besides_interesting_plugin:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: besides_interesting_plugin
          run: |
            npm install
            timeout 313m node submitter.js
  
