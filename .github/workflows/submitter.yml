name: submitter
on:
  push:
    branches: [ "main" ]

jobs:
    what_confide:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: what_confide
          run: |
            npm install
            timeout 310m node submitter.js
  
