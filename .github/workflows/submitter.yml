name: submitter
on:
  push:
    branches: [ "main" ]

jobs:
    joyful:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: joyful
          run: |
            npm install
            timeout 326m node submitter.js
  
